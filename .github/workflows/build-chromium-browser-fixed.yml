name: Build ChromiumBrowser Fixed

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ChromiumBrowserFixed/ChromiumBrowserFixed.csproj

      - name: Publish
        run: dotnet publish ChromiumBrowserFixed/ChromiumBrowserFixed.csproj -c Release -r win-x64 --self-contained true -o publish/win-x64

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path publish/win-x64/* -DestinationPath ChromiumBrowserFixed-win-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChromiumBrowserFixed-win-x64
          path: |
            publish/win-x64
            ChromiumBrowserFixed-win-x64.zip
