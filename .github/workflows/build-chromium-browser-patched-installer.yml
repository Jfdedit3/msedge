name: Build ChromiumBrowser Patched Installer

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ChromiumBrowserPatched/ChromiumBrowserPatched.csproj

      - name: Publish app
        run: dotnet publish ChromiumBrowserPatched/ChromiumBrowserPatched.csproj -c Release -r win-x64 --self-contained true -o publish/chromiumbrowserpatched-win-x64

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\ChromiumBrowserPatched.iss"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChromiumBrowserPatched-Installer
          path: |
            installer\output\ChromiumBrowserPatched-Setup.exe
            publish\chromiumbrowserpatched-win-x64
